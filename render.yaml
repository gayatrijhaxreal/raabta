databases:
  - name: raabta-db
    databaseName: raabta
    plan: free

services:
  - type: web
    name: raabta-foundation
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: raabta-db
          property: connectionString
