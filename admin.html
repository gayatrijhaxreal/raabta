<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raabta Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <header class="admin-header">
    <div class="brand">
      <div class="brand-kicker">Raabta Foundation</div>
      <h1>Admin Dashboard</h1>
      <p>View Contact Us submissions securely.</p>
    </div>
    <a class="home-link" href="./">Back To Website</a>
  </header>

  <main class="admin-main">
    <section class="panel auth-panel">
      <h2>Admin Access</h2>
      <p>Enter your admin token to load contact form records.</p>
      <form id="auth-form" class="auth-form">
        <label for="admin-token">Admin Token</label>
        <input id="admin-token" type="password" placeholder="Enter ADMIN_TOKEN" autocomplete="current-password" required>
        <div class="auth-actions">
          <button id="login-btn" type="submit">Load Contacts</button>
          <button id="logout-btn" type="button" class="ghost">Clear Token</button>
        </div>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section class="panel table-panel">
      <div class="table-head">
        <h2>Contact Form Database</h2>
        <button id="refresh-btn" type="button" class="ghost">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Subject</th>
              <th>Message</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="contacts-body">
            <tr>
              <td colspan="7" class="empty">Enter admin token and click Load Contacts.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>

</html>
